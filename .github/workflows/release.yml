name: release

# builds the android release apk and publishes it to a github release.
# fire it by pushing a version tag (e.g. `git tag v2.5.0 && git push --tags`)
# or run it manually from the actions tab. current latest release: v2.5.0.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag (e.g. v2.5.0)"
        required: true
        default: "v2.5.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: set up android sdk
        uses: android-actions/setup-android@v3

      - name: signing keystore
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # use the repo signing key if a fork provides one as a secret,
          # otherwise mint an ephemeral debug key so the build still signs.
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > pigeon-debug.keystore
          else
            keytool -genkey -v -keystore pigeon-debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: firebase config (optional)
        working-directory: android
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # push (fcm) is only wired when google-services.json is present;
          # the build degrades gracefully without it.
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json
          fi

      - name: build release apk
        working-directory: android
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: rename apk
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "pigeonsms-${TAG#v}.apk"

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: pigeonsms-*.apk
          generate_release_notes: true
