name: build

# build-only: compiles + signs the release APK and uploads it as an artifact.
# does NOT publish a public release (that stays with the oss repo for the atomic ship).
on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: set up android sdk
        uses: android-actions/setup-android@v3

      - name: build release apk
        working-directory: android
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: upload apk
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pigeonsms-2.7.0-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
